<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulário de Cadastro</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow">
    <div class="card-body">

      <h2 class="card-title mb-3">Formulário de Cadastro</h2>

      <ul>
        <li>Preencha todos os campos</li>
        <li>Clique em Enviar</li>
      </ul>

      <form action="cadastro.php" method="POST">

        <!-- Informações Pessoais -->
        <fieldset class="border p-3 mb-4">
          <legend class="float-none w-auto px-2 fs-6">Informações Pessoais</legend>

          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" name="nome" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" name="data" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label d-block">Sexo</label>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="sexo" value="M">
              <label class="form-check-label">Masculino</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="sexo" value="F">
              <label class="form-check-label">Feminino</label>
            </div>
          </div>
        </fieldset>


        <!-- Preferências -->
        <fieldset class="border p-3 mb-4">
          <legend class="float-none w-auto px-2 fs-6">Preferências</legend>

          <div class="mb-3">
            <label class="form-label">Cidade</label>
            <select name="cidade" class="form-select">
              <option value="">Selecione...</option>
              <option>Recife</option>
              <option>São Paulo</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Mensagem</label>
            <textarea name="msg" rows="3" class="form-control"></textarea>
          </div>
        </fieldset>

        <button type="submit" class="btn btn-primary">
          Enviar
        </button>

      </form>

    </div>
  </div>


  <!-- Google Maps Responsivo -->
  <div class="card shadow mt-4">
    <div class="card-body">
      <h5 class="card-title">Localização</h5>

      <div class="ratio ratio-16x9">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3949.7704501322586!2d-34.8902828!3d-8.0557991!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x7ab18ea6e481ed1%3A0x2bd9d6c2a072628d!2sUniversidade%20Cat%C3%B3lica%20de%20Pernambuco%20-%20Polo%20EAD%20Unicap!5e0!3m2!1spt-BR!2sbr!4v1700000000000"
          style="border:0;"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>

    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
