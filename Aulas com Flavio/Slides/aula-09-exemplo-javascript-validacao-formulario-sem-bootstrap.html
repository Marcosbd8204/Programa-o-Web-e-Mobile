<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="aula-09-estilos.css">
</head>
<body>
    <div class="container">
        <h1>Formulário de Contato</h1>
        <p class="subtitulo">Preencha os campos abaixo para entrar em contato</p>

        <form id="formulario-contato">
            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                <span class="erro" id="erro-nome"></span>
            </div>

            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
                <span class="erro" id="erro-email"></span>
            </div>

            <div class="campo">
                <label for="assunto">Assunto:</label>
                <input type="text" id="assunto" name="assunto" placeholder="Qual o motivo do contato?" required>
                <span class="erro" id="erro-assunto"></span>
            </div>

            <div class="botoes">
                <button type="submit" class="btn-enviar">Enviar</button>
                <button type="button" class="btn-limpar" id="btn-limpar">Limpar</button>
            </div>
        </form>

        <div id="mensagem-sucesso" class="mensagem-sucesso" style="display: none;">
            <h3>✓ Mensagem enviada com sucesso!</h3>
            <p>Entraremos em contato em breve.</p>
        </div>
    </div>

    <script src="aula-09-script.js"></script>
</body>
</html>
